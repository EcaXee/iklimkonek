<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IklimKonek - Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .mobile-container { max-width: 450px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #ffffff; }
    </style>
</head>
<body>
    <div class="mobile-container border-x border-gray-200">
        <header class="bg-white p-4 flex justify-between items-center border-b">
            <h1 class="text-xl font-black text-teal-700 italic">IklimKonek</h1>
            <button id="btn-menu" class="text-gray-400 text-3xl">&#9776;</button>
        </header>

        <div class="px-6 py-12 flex-grow">
            <div class="bg-white rounded-[32px] shadow-sm p-8 flex flex-col items-center relative mt-10 border border-gray-50">
                <div class="absolute -top-16">
                    <img id="display-avatar" src="https://ui-avatars.com/api/?name=U&background=0D9488&color=fff" 
                         class="w-32 h-32 rounded-full border-4 border-white shadow-md object-cover">
                </div>

                <div class="mt-16 text-center">
                    <h2 id="display-name" class="text-2xl font-black text-gray-900">Memuat...</h2>
                    <p id="display-handle" class="text-gray-500 font-medium">@username</p>
                    
                    <div class="mt-4 bg-gray-50 px-4 py-1.5 rounded-full flex items-center gap-2 justify-center border border-gray-100">
                        <svg class="w-4 h-4 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" /></svg>
                        <span class="text-[11px] text-gray-400 font-medium">Mataram, Nusa Tenggara Barat</span>
                    </div>
                </div>

                <div class="w-full mt-8 pt-6 border-t border-gray-100">
                    <a href="profile-edit.html" class="block w-full bg-[#D6E6EB] text-gray-800 text-center py-4 rounded-xl font-bold text-sm active:scale-95 transition-all">
                        Edit Profile
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>
