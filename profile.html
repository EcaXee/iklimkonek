<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IklimKonek - Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .mobile-container { max-width: 450px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #ffffff; }

        @media (min-width: 640px) {
            .mobile-container { max-width: none; min-height: calc(100vh - 56px); background: #D4D4D8; }
        }

        @media (min-width: 768px) {
            .mobile-container { min-height: calc(100vh - 64px); }
        }
    </style>
</head>
<body>

    <header class="hidden sm:block bg-gray-100 border-b border-gray-300 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-5 lg:px-8 h-14 md:h-16 flex items-center justify-between">
            <a href="index.html" class="text-2xl lg:text-3xl font-black tracking-tighter text-emerald-600">Iklim<span class="text-blue-700">Konek</span></a>
            <nav class="flex items-center gap-3 md:gap-5 lg:gap-8 text-gray-700 font-semibold text-xs md:text-sm lg:text-base whitespace-nowrap">
                <a href="index.html" class="hover:text-emerald-600">Home</a>
                <a href="dashboard-petani.html" class="hover:text-emerald-600">Petani</a>
                <a href="dashboard-nelayan.html" class="hover:text-emerald-600">Nelayan</a>
                <a href="forum-petani.html" class="hover:text-emerald-600">Forum Petani</a>
                <a href="forum-nelayan.html" class="hover:text-emerald-600">Forum Nelayan</a>
            </nav>
            <a href="profile.html" class="w-9 h-9 md:w-10 md:h-10 rounded-full border border-gray-300 bg-white text-gray-600 flex items-center justify-center hover:border-emerald-500 hover:text-emerald-600 transition-colors" aria-label="Buka profil">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A9 9 0 1119.5 8.5a9 9 0 01-14.379 9.304zM15 11a3 3 0 11-6 0 3 3 0 016 0zm-8.5 7.5a7.5 7.5 0 0111 0" />
                </svg>
            </a>
        </div>
    </header>

    <div class="mobile-container border-x border-gray-200 sm:border-x-0">
        <header class="bg-white p-4 flex justify-between items-center border-b sm:hidden">
            <h1 class="text-xl font-black text-teal-700 italic">IklimKonek</h1>
            <button id="btn-menu" class="text-gray-400 text-3xl">&#9776;</button>
        </header>

        <div class="px-6 py-12 flex-grow sm:flex sm:items-center sm:justify-center sm:py-6">
            <div class="bg-white rounded-[32px] shadow-sm p-8 flex flex-col items-center relative mt-10 border border-gray-50 sm:w-full sm:max-w-md">
                <div class="absolute -top-16">
                    <img id="display-avatar" src="https://ui-avatars.com/api/?name=U&background=0D9488&color=fff" alt="Foto profil"
                         class="w-32 h-32 rounded-full border-4 border-white shadow-md object-cover">
                </div>

                <div class="mt-16 text-center">
                    <h2 id="display-name" class="text-2xl font-black text-gray-900">Memuat...</h2>
                    <p id="display-handle" class="text-gray-500 font-medium">@username</p>
                    
                    <div class="mt-4 bg-gray-50 px-4 py-1.5 rounded-full flex items-center gap-2 justify-center border border-gray-100">
                        <svg class="w-4 h-4 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" /></svg>
                        <span class="text-[11px] text-gray-400 font-medium">Mataram, Nusa Tenggara Barat</span>
                    </div>
                </div>

                <div class="w-full mt-8 pt-6 border-t border-gray-100">
                    <a href="profile-edit.html" class="block w-full bg-[#D6E6EB] text-gray-800 text-center py-4 rounded-xl font-bold text-sm active:scale-95 transition-all">
                        Edit Profile
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>
