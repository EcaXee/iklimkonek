<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IklimKonek - Daftar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .mobile-container {
            max-width: 450px;
            margin: 0 auto;
            min-height: 100vh;
            background: #E5E7EB;
        }

        @media (min-width: 640px) {
            .mobile-container {
                max-width: none;
                min-height: calc(100vh - 56px);
                background: #D4D4D8;
            }
        }

        @media (min-width: 768px) {
            .mobile-container {
                min-height: calc(100vh - 64px);
            }
        }
    </style>
</head>
<body class="bg-gray-300">

    <header class="hidden sm:block bg-gray-100 border-b border-gray-300 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-5 lg:px-8 h-14 md:h-16 flex items-center justify-between">
            <a href="index.html" class="text-2xl lg:text-3xl font-black tracking-tighter text-emerald-600">Iklim<span class="text-blue-700">Konek</span></a>
            <nav class="flex items-center gap-3 md:gap-5 lg:gap-8 text-gray-700 font-semibold text-xs md:text-sm lg:text-base whitespace-nowrap">
                <a href="index.html" class="hover:text-emerald-600">Home</a>
                <a href="dashboard-petani.html" class="hover:text-emerald-600">Petani</a>
                <a href="dashboard-nelayan.html" class="hover:text-emerald-600">Nelayan</a>
                <a href="forum-petani.html" class="hover:text-emerald-600">Forum Petani</a>
                <a href="forum-nelayan.html" class="hover:text-emerald-600">Forum Nelayan</a>
            </nav>
            <a href="profile.html" class="w-9 h-9 md:w-10 md:h-10 rounded-full border border-gray-300 bg-white text-gray-600 flex items-center justify-center hover:border-emerald-500 hover:text-emerald-600 transition-colors" aria-label="Buka profil">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A9 9 0 1119.5 8.5a9 9 0 01-14.379 9.304zM15 11a3 3 0 11-6 0 3 3 0 016 0zm-8.5 7.5a7.5 7.5 0 0111 0" />
                </svg>
            </a>
        </div>
    </header>

    <div class="mobile-container flex flex-col shadow-xl border-x border-gray-300 sm:border-x-0 sm:shadow-none">
        <header class="bg-white p-4 flex justify-between items-center shadow-sm sticky top-0 z-10 sm:hidden">
            <a href="index.html">
                <h1 class="text-2xl font-black text-teal-700 italic tracking-tighter">IklimKonek</h1>
            </a>
            <button id="btn-menu" class="text-gray-400 text-3xl active:scale-90 transition-transform focus:outline-none">
                &#9776;
            </button>
        </header>

        <main class="flex-grow flex flex-col items-center justify-center px-10 py-10 sm:py-6">
            <div class="w-full max-w-[380px] mx-auto text-center mb-10">
                <h2 class="text-4xl font-black text-teal-700 italic tracking-tighter leading-none">IklimKonek</h2>
                <p class="text-[13px] font-bold mt-2">
                    Data Iklim untuk <span class="text-teal-600">Petani</span> & <span class="text-blue-600">Nelayan</span>
                </p>
            </div>

            <h3 class="text-2xl font-black mb-6 tracking-tight uppercase italic text-gray-800">DAFTAR</h3>

            <form id="signup-form" class="w-full max-w-[380px] mx-auto space-y-4">
                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
                    </span>
                    <input type="text" required placeholder="Nama" class="w-full py-3.5 pl-12 pr-4 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all text-sm font-medium">
                </div>

                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>
                    </span>
                    <input type="email" required placeholder="Username (Email)" class="w-full py-3.5 pl-12 pr-4 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all text-sm font-medium">
                </div>

                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                    </span>
                    <input type="password" required placeholder="Password" class="w-full py-3.5 pl-12 pr-12 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all text-sm font-medium">
                </div>

                <div class="relative">
                    <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                    </span>
                    <input type="password" required placeholder="konfirmasi Password" class="w-full py-3.5 pl-12 pr-12 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all text-sm font-medium">
                </div>

                <button type="submit" class="w-full bg-[#059669] text-white py-3.5 rounded-xl font-bold text-lg shadow-md hover:bg-[#047857] transition-all active:scale-95">
                    Daftar
                </button>
            </form>

            <p class="mt-6 text-[13px] font-medium text-gray-400 text-center">
                Sudah punya akun? <a href="login.html" class="text-teal-600 font-bold">Masuk di sini</a>
            </p>
        </main>
    </div>

    <script src="js/sidebar.js"></script>
    <script type="module" src="js/auth/signup.js"></script>
</body>
</html>
