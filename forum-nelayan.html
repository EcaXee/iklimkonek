<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IklimKonek - Forum Nelayan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .mobile-container { max-width: 450px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: #ffffff; }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }

        @media (min-width: 640px) {
            .mobile-container { max-width: none; background: #D4D4D8; }
        }
    </style>
</head>
<body class="bg-gray-100">

    <header class="hidden sm:block bg-gray-100 border-b border-gray-300 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-5 lg:px-8 h-14 md:h-16 flex items-center justify-between">
            <a href="index.html" class="text-2xl lg:text-3xl font-black tracking-tighter text-emerald-600">Iklim<span class="text-blue-700">Konek</span></a>
            <nav class="flex items-center gap-3 md:gap-5 lg:gap-8 text-gray-700 font-semibold text-xs md:text-sm lg:text-base whitespace-nowrap">
                <a href="index.html" class="hover:text-emerald-600">Home</a>
                <a href="dashboard-petani.html" class="hover:text-emerald-600">Petani</a>
                <a href="dashboard-nelayan.html" class="hover:text-emerald-600">Nelayan</a>
                <a href="forum-petani.html" class="hover:text-emerald-600">Forum Petani</a>
                <a href="forum-nelayan.html" class="hover:text-emerald-600">Forum Nelayan</a>
            </nav>
            <a href="profile.html" class="w-9 h-9 md:w-10 md:h-10 rounded-full border border-gray-300 bg-white text-gray-600 flex items-center justify-center hover:border-emerald-500 hover:text-emerald-600 transition-colors" aria-label="Buka profil">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A9 9 0 1119.5 8.5a9 9 0 01-14.379 9.304zM15 11a3 3 0 11-6 0 3 3 0 016 0zm-8.5 7.5a7.5 7.5 0 0111 0" />
                </svg>
            </a>
        </div>
    </header>

    <div class="mobile-container border-x border-gray-200 shadow-xl sm:border-x-0 sm:shadow-none">
        <header class="bg-white p-4 flex justify-between items-center sticky top-0 z-20 border-b sm:hidden">
            <h1 class="text-2xl font-black text-blue-700 italic tracking-tighter">IklimKonek</h1>
            <button id="btn-menu" class="text-gray-400 text-3xl focus:outline-none hover:text-blue-600">&#9776;</button>
        </header>

        <div class="bg-white px-5 pt-5 pb-2">
            <h2 class="text-xl font-extrabold text-gray-900 tracking-tight">Forum Nelayan 🌊</h2>
            <p class="text-[11px] text-gray-400 mt-0.5">Berbagi kabar laut dan tangkapan di pesisir Mataram</p>
        </div>

        <div class="bg-white p-5 border-b-8 border-gray-50 sm:max-w-3xl sm:mx-auto sm:w-full sm:mt-1 sm:rounded-xl sm:border-b-0 sm:shadow-sm">
            <form id="chat-form">
                <div class="flex gap-4">
                    <img id="user-avatar" src="https://ui-avatars.com/api/?name=U&background=1D4ED8&color=fff" alt="Avatar pengguna" class="w-12 h-12 rounded-full border object-cover shadow-sm">
                    <div class="flex-grow">
                        <div class="flex items-center gap-2 mb-1">
                            <span id="user-name" class="font-bold text-[14px] text-gray-900">Memuat...</span>
                            <span id="user-handle" class="text-[11px] text-gray-400 font-normal">@username</span>
                        </div>
                        <textarea id="chat-input" rows="2" class="w-full text-[13px] text-gray-700 outline-none resize-none py-1 placeholder:text-gray-300" placeholder="Info gelombang atau tangkapan hari ini?" required></textarea>
                        <div class="flex justify-between items-end mt-4">
                            <span class="text-[10px] text-gray-300 flex items-center gap-1">Pesisir Mataram</span>
                            <button type="submit" class="bg-blue-600 text-white px-7 py-2 rounded-full text-[11px] font-black tracking-widest hover:bg-blue-700 active:scale-95 transition-all shadow-md">KIRIM</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div id="chat-container" class="flex-grow overflow-y-auto bg-white sm:max-w-3xl sm:mx-auto sm:w-full sm:mt-2 sm:rounded-xl sm:shadow-sm">
            <div class="flex flex-col items-center justify-center py-20 text-gray-300 italic">Memuat kabar laut...</div>
        </div>
    </div>

    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/forum-nelayan.js"></script>
</body>
</html>
