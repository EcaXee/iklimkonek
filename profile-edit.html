<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IklimKonek - Edit Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .mobile-container { max-width: 450px; margin: 0 auto; min-height: 100vh; background: #ffffff; }
        /* Animasi fade in agar transisi smooth */
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="mobile-container border-x border-gray-200 shadow-xl">
        <header class="bg-white p-4 flex justify-between items-center border-b">
            <h1 class="text-xl font-black text-teal-700 italic">IklimKonek</h1>
            <button class="text-gray-400 text-3xl">&#9776;</button>
        </header>

        <div class="px-6 py-12">
            <form id="edit-profile-form" class="bg-white rounded-[32px] shadow-sm p-8 flex flex-col items-center relative mt-10 border border-gray-50">
                
                <div class="absolute -top-16 cursor-pointer group">
                    <div class="relative">
                        <img id="edit-avatar" src="https://ui-avatars.com/api/?name=U&background=0D9488&color=fff" 
                             class="w-32 h-32 rounded-full border-4 border-white shadow-md object-cover group-hover:opacity-80 transition-opacity">
                        
                        <div class="absolute bottom-0 right-1 bg-teal-600 p-2 rounded-full border-2 border-white shadow-sm pointer-events-none">
                            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                        </div>
                    </div>
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                </div>

                <div class="mt-16 w-full space-y-4">
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Nama Lengkap</label>
                        <input type="text" id="input-name" required 
                            class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-teal-500 text-sm font-medium transition-all">
                    </div>
                    
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest ml-1">Username</label>
                        <input type="text" id="input-handle" required 
                            class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-teal-500 text-sm font-medium transition-all">
                    </div>
                    
                    <div class="pt-6 border-t border-gray-100">
                        <button type="submit" id="btn-save" class="w-full bg-[#D6E6EB] text-gray-800 py-4 rounded-xl font-bold text-sm active:scale-95 transition-all">
                            Simpan Perubahan
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="js/profile.js"></script>
</body>
</html>
