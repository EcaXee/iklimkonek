<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IklimKonek - Forum Komunitas Petani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f9fafb;
        }
        .mobile-container { 
            max-width: 450px; 
            margin: 0 auto; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            background: #ffffff; 
        }
        /* Custom scrollbar agar tetap rapi */
        #chat-container::-webkit-scrollbar {
            width: 4px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background-color: #e5e7eb;
            border-radius: 10px;
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="mobile-container border-x border-gray-200 shadow-xl">
        
        <header class="bg-white p-4 flex justify-between items-center sticky top-0 z-20 border-b">
            <h1 class="text-2xl font-black text-teal-700 italic tracking-tighter">IklimKonek</h1>
            <button id="btn-menu" class="text-gray-400 text-3xl focus:outline-none hover:text-teal-600 transition-colors">
                &#9776;
            </button>
        </header>

        <div class="bg-white px-5 pt-5 pb-2">
            <h2 class="text-xl font-extrabold text-gray-900 tracking-tight">Forum Warga</h2>
            <p class="text-[11px] text-gray-400 mt-0.5">Berbagi kabar pertanian di Mataram, Nusa Tenggara Barat</p>
        </div>

        <div class="bg-white p-5 border-b-8 border-gray-50">
            <form id="chat-form">
                <div class="flex gap-4">
                    <img src="https://ui-avatars.com/api/?name=User&background=0D9488&color=fff" 
                         class="w-12 h-12 rounded-full border border-gray-100 object-cover shadow-sm">
                    
                    <div class="flex-grow">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-bold text-[14px] text-gray-900">Anda</span>
                            <span class="text-[11px] text-gray-400 font-normal">@username</span>
                        </div>
                        
                        <textarea id="chat-input" rows="2" 
                            class="w-full text-[13px] text-gray-700 outline-none resize-none py-1 placeholder:text-gray-300"
                            placeholder="Bagaimana kabar kebun hari ini?" required></textarea>
                        
                        <div class="flex justify-between items-end mt-4">
                            <span class="text-[10px] text-gray-300 flex items-center gap-1">
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                                </svg>
                                Mataram
                            </span>
                            <button type="submit" 
                                class="bg-teal-600 text-white px-7 py-2 rounded-full text-[11px] font-black tracking-widest hover:bg-teal-700 active:scale-95 transition-all shadow-md">
                                KIRIM
                            </button>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div id="chat-container" class="flex-grow overflow-y-auto bg-white">
            <div class="flex flex-col items-center justify-center py-20 text-gray-300">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-teal-600 mb-2"></div>
                <p class="text-[10px] font-medium tracking-widest uppercase">Memuat Kabar Lahan...</p>
            </div>
        </div>

    </div>

    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/forum.js"></script>
</body>
</html>
